<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#a900ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NoteZ">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23a900ff' width='180' height='180'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>Z</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23a900ff' width='180' height='180' rx='40'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>Z</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a900ff;
            --accent-glow: rgba(169, 0, 255, 0.4);
            --bg-primary: #0f0f11;
            --bg-secondary: #1a1a1f;
            --bg-tertiary: #242429;
            --text-primary: #e8e8f0;
            --text-secondary: #a8a8b0;
            --border: #2e2e38;
            --border-light: rgba(232, 232, 240, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="light"] {
            --accent: #6b5ce7;
            --accent-glow: rgba(107, 92, 231, 0.3);
            --bg-primary: #f5f4f8;
            --bg-secondary: #eeebf8;
            --bg-tertiary: #e5e0f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border: #d4d0e0;
            --border-light: rgba(26, 26, 26, 0.08);
        }

        [data-theme="navy"] {
            --accent: #4d9fff;
            --accent-glow: rgba(77, 159, 255, 0.3);
            --bg-primary: #0a0f1e;
            --bg-secondary: #0f1629;
            --bg-tertiary: #1a1f35;
            --text-primary: #e0e8ff;
            --text-secondary: #8fa3bf;
            --border: #253859;
            --border-light: rgba(224, 232, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Syne', sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            transition: background 0.3s cubic-bezier(.4, 0, .2, 1);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
            opacity: 0.6;
        }

        ::-webkit-scrollbar-thumb:hover {
            opacity: 0.9;
        }

        /* Loading Overlay */
        #app-loading {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.4s cubic-bezier(.4, 0, .2, 1);
        }

        #app-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .logo-animation {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, #ff00cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Auth Screen */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #auth-screen.hidden {
            display: none;
        }

        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px var(--accent-glow);
        }

        .auth-logo {
            font-size: 48px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--accent) 0%, #ff00cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: 8px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: 'Syne', sans-serif;
        }

        .auth-tab.active {
            background: var(--accent);
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: 'Syne', sans-serif;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .auth-button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Syne', sans-serif;
            margin-top: 10px;
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px var(--accent-glow);
        }

        .auth-button:active {
            transform: translateY(0);
        }

        /* Main Layout */
        #app {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        #app.hidden {
            display: none;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-header:hover {
            background: var(--bg-tertiary);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #ff00cc 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
        }

        .user-email {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .folders-section {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .folders-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding: 0 8px;
        }

        .folder-item {
            padding: 10px 8px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }

        .folder-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .folder-item.active {
            background: var(--accent-glow);
            color: var(--accent);
            font-weight: 600;
        }

        .folder-count {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            font-family: 'Syne', sans-serif;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px var(--accent-glow);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            width: 100%;
        }

        .btn-ghost:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
        }

        .btn-icon:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            position: relative;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fadeIn 0.3s cubic-bezier(.4, 0, .2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Library View */
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .library-section {
            margin-bottom: 40px;
        }

        .library-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .library-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .note-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(.4, 0, .2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            min-height: 180px;
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #ff00cc);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .note-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 12px 24px var(--accent-glow);
            background: var(--bg-tertiary);
        }

        .note-card:hover::before {
            opacity: 1;
        }

        .note-card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .note-card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .note-card-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .note-card-count {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Notes List View */
        .notes-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .note-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 140px;
        }

        .note-item:hover {
            border-color: var(--accent);
            background: var(--bg-tertiary);
            transform: translateY(-2px);
        }

        .note-item-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .note-item-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .note-item-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .note-item-content {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            flex: 1;
        }

        .note-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Editor View */
        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: 16px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .editor-title {
            font-size: 24px;
            font-weight: 700;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
        }

        .editor-area {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            font-family: 'DM Mono', monospace;
            color: var(--text-primary);
            overflow-y: auto;
            outline: none;
            resize: none;
        }

        .editor-area:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Upload View */
        .upload-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            padding: 40px;
        }

        .upload-zone {
            width: 100%;
            max-width: 500px;
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-secondary);
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: var(--bg-tertiary);
        }

        .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--accent);
        }

        .upload-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .upload-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        #upload-input {
            display: none;
        }

        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .settings-group {
            margin-bottom: 25px;
        }

        .settings-label {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: block;
        }

        .theme-buttons {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
            font-family: 'Syne', sans-serif;
        }

        .theme-btn.active {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-tertiary);
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
        }

        .slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .slider-value {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 35px;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            background: var(--bg-tertiary);
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            transition: left 0.2s;
        }

        .toggle-switch.active::after {
            left: 25px;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
        }

        .toast {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }

        .toast.removing {
            animation: slideOut 0.3s cubic-bezier(.4, 0, .2, 1);
        }

        .toast-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 14px;
        }

        .toast-message {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toast.success .toast-icon {
            color: var(--success);
        }

        .toast.warning .toast-icon {
            color: var(--warning);
        }

        .toast.danger .toast-icon {
            color: var(--danger);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
                display: none;
            }

            .sidebar.mobile-open {
                display: flex;
            }

            .library-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .notes-list {
                grid-template-columns: 1fr;
            }

            .content {
                padding: 20px;
            }

            .auth-card {
                padding: 30px;
            }
        }

        /* Utility */
        .hidden {
            display: none !important;
        }

        body.no-scroll {
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="app-loading">
        <div class="logo-animation">Z</div>
    </div>

    <!-- Auth Screen -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">NoteZ</div>
            <div class="auth-title" id="auth-title">Welcome Back</div>
            <div class="auth-subtitle">Your personal HTML notes workspace</div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="signup">Sign Up</button>
            </div>

            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Username or Email</label>
                    <input type="text" id="login-username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="auth-button">Sign In →</button>
            </form>

            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signup-username" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" placeholder="Create a password" required>
                </div>
                <button type="submit" class="auth-button">Sign Up →</button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header" id="user-profile">
                <div class="user-avatar" id="user-avatar">S</div>
                <div class="user-info">
                    <div class="user-name" id="user-name">User</div>
                    <div class="user-email" id="user-email">user@notez.app</div>
                </div>
            </div>

            <div class="folders-section">
                <div class="folders-title">📁 Folders</div>
                <div id="folders-list"></div>
                <button class="btn btn-ghost" id="new-folder-btn" style="margin-top: 10px;">+ New Folder</button>
            </div>

            <div class="sidebar-footer">
                <button class="btn btn-primary" id="upload-note-btn">+ Upload</button>
                <button class="btn btn-ghost" id="settings-btn">⚙️ Settings</button>
                <button class="btn btn-ghost" id="logout-btn">Sign Out</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main">
            <div class="header">
                <div class="header-title" id="page-title">Library</div>
                <div class="header-actions">
                    <button class="btn-icon" id="fullscreen-btn" title="Fullscreen">⛶</button>
                </div>
            </div>

            <div class="content">
                <!-- Library View -->
                <div id="library-view" class="view active">
                    <div class="library-section">
                        <div class="library-title">Library</div>
                        <div class="library-subtitle" id="library-count">0 folders</div>
                        <div class="library-grid" id="folders-grid"></div>
                    </div>

                    <div class="library-section" id="recent-section" style="display: none;">
                        <div class="library-title">Recent</div>
                        <div class="notes-list" id="recent-list"></div>
                    </div>
                </div>

                <!-- Folder View -->
                <div id="folder-view" class="view">
                    <div class="library-title" id="folder-title">Folder</div>
                    <div class="notes-list" id="notes-grid"></div>
                </div>

                <!-- Editor View -->
                <div id="editor-view" class="view">
                    <div class="editor-container">
                        <div class="editor-header">
                            <div class="editor-title" id="editor-title">New Note</div>
                            <div class="editor-actions">
                                <button class="btn btn-ghost" id="close-editor-btn">Close</button>
                                <button class="btn btn-primary" id="save-note-btn">Save</button>
                            </div>
                        </div>
                        <div id="editor-area" class="editor-area" contenteditable="true" spellcheck="false"></div>
                    </div>
                </div>

                <!-- Upload View -->
                <div id="upload-view" class="view">
                    <div class="library-title">Upload Note</div>
                    <div class="upload-container">
                        <div class="upload-zone" id="upload-zone">
                            <div class="upload-icon">↑</div>
                            <div class="upload-title">Click or drag & drop</div>
                            <div class="upload-subtitle">Only .html files are accepted</div>
                        </div>
                        <input type="file" id="upload-input" accept=".html">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Settings</div>
                <button class="modal-close" id="close-settings-btn">×</button>
            </div>

            <div class="settings-group">
                <label class="settings-label">Theme</label>
                <div class="theme-buttons">
                    <button class="theme-btn active" data-theme="dark">Dark</button>
                    <button class="theme-btn" data-theme="light">Light</button>
                    <button class="theme-btn" data-theme="navy">Navy</button>
                </div>
            </div>

            <div class="settings-group">
                <label class="settings-label">Font Size</label>
                <div class="slider-container">
                    <span style="font-size: 12px;">A</span>
                    <input type="range" id="font-size-slider" class="slider" min="12" max="24" value="16">
                    <span style="font-size: 18px;">A</span>
                    <span class="slider-value" id="font-size-value">16px</span>
                </div>
            </div>

            <div class="settings-group">
                <label class="settings-label">Auto-save</label>
                <div class="toggle">
                    <span>Sync when notes change</span>
                    <div class="toggle-switch active" id="autosave-toggle"></div>
                </div>
            </div>

            <div class="settings-group" style="border-top: 1px solid var(--border); padding-top: 20px; margin-top: 20px;">
                <div style="font-size: 12px; color: var(--text-secondary);">
                    ✓ <span id="sync-status">6 notes — 3/4/2026 7:43:46 PM</span>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-secondary);">
                NoteZ<br><span id="version">v4.0</span>
            </div>

            <button class="btn btn-ghost" id="signout-btn" style="margin-top: 20px;">Sign Out</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }
    </script>

    <!-- Main App Script -->
    <script src="app.js"></script>
</body>
</html>
